steps:
  # Build frontend
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['--prefix', 'frontend', 'install']
  - name: 'node:18'
    entrypoint: 'npm'
    args: ['--prefix', 'frontend', 'run', 'build']
    
  # Build background worker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/janveda-worker', './backend', '-f', './backend/Dockerfile.worker']

  # Build backend API image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/janveda-api', './backend']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'janveda-backend'
    - '--image'
    - 'gcr.io/$PROJECT_ID/janveda-api'
    - '--region'
    - 'asia-south1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'GEMINI_API_KEY=$_GEMINI_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/janveda-api'
  - 'gcr.io/$PROJECT_ID/janveda-worker'
